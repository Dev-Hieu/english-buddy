<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <rect width="120" height="120" rx="24" fill="#1CB0A8"/>
  <!-- Head -->
  <ellipse cx="50" cy="42" rx="32" ry="32" fill="#26C7BD"/>
  <!-- Eye white -->
  <circle cx="62" cy="36" r="10" fill="#fff"/>
  <!-- Pupil -->
  <circle cx="65" cy="35" r="5" fill="#262633"/>
  <!-- Eye shine -->
  <circle cx="67" cy="33" r="2" fill="#fff"/>
  <!-- Beak -->
  <polygon points="80,40 96,46 80,52" fill="#FFA726" rx="2"/>
  <!-- Wing hint -->
  <ellipse cx="38" cy="62" rx="18" ry="24" fill="#15A39B" transform="rotate(-10 38 62)"/>
  <!-- Speech bubble -->
  <rect x="58" y="72" width="40" height="30" rx="10" fill="#fff"/>
  <!-- Hi! text -->
  <text x="68" y="93" font-family="Arial,sans-serif" font-weight="bold" font-size="16" fill="#1CB0A8">Hi!</text>
</svg>
