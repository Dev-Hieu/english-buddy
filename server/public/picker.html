<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chọn ảnh — English Buddy</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: 'Nunito', system-ui, sans-serif; background: #f0f2f7; color: #1f2430; }
    a { color: #1cb0a8; }

    /* ── Header ── */
    .header { position: sticky; top: 0; z-index: 10; background: #fff; border-bottom: 1px solid #e2e5ec; padding: 16px 24px; }
    .header h1 { font-size: 20px; font-weight: 900; }
    .header .desc { font-size: 13px; color: #6b7280; margin-top: 2px; }

    /* ── Stats bar ── */
    .stats { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 13px; font-weight: 700; color: #374151; flex-wrap: wrap; }
    .stats .pill { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 800; }
    .stats .pill.green { background: #d1fae5; color: #047857; }
    .stats .pill.red { background: #fee2e2; color: #b91c1c; }

    /* ── Filters ── */
    .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; align-items: center; }
    .search-box { padding: 8px 12px; border: 2px solid #e2e5ec; border-radius: 10px; font-size: 14px; font-weight: 600; width: 200px; outline: none; transition: border .2s; }
    .search-box:focus { border-color: #1cb0a8; }
    .filters select { padding: 8px 12px; border: 2px solid #e2e5ec; border-radius: 10px; font-size: 13px; font-weight: 700; background: #fff; cursor: pointer; }
    .chip-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .chip { padding: 5px 12px; border-radius: 20px; border: 2px solid #e2e5ec; background: #fff; font-size: 12px; font-weight: 800; cursor: pointer; transition: all .15s; }
    .chip:hover { border-color: #1cb0a8; }
    .chip.active { background: #1cb0a8; color: #fff; border-color: #1cb0a8; }
    .btn-filter { padding: 7px 14px; border-radius: 10px; border: 2px solid #e2e5ec; background: #fff; font-size: 13px; font-weight: 800; cursor: pointer; transition: all .15s; }
    .btn-filter:hover { border-color: #1cb0a8; }
    .btn-filter.active { background: #fef3c7; border-color: #f59e0b; color: #92400e; }

    /* ── Grid ── (số cột đặt qua JS, mặc định 6) */
    .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; padding: 16px 24px; }
    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 760px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; } }
    .colsel { display: inline-flex; gap: 4px; align-items: center; }
    .colsel button { width: 30px; height: 30px; border-radius: 8px; border: 0; font-weight: 800; background: #eef0f3; color: #6b7280; cursor: pointer; }
    .colsel button.active { background: #1cb0a8; color: #fff; }
    .authbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 10px 0; font-weight: 700; font-size: 14px; }
    .authbar input { height: 36px; border: 2px solid #e5e7eb; border-radius: 10px; padding: 0 10px; font-weight: 700; }
    .authbar .ok { color: #047857; } .authbar .warn { color: #b91c1c; }
    .authbar button { height: 36px; border: 0; border-radius: 10px; padding: 0 14px; font-weight: 800; cursor: pointer; background: #1cb0a8; color: #fff; }
    .authbar button.ghost { background: #eef0f3; color: #374151; }

    /* ── Card ── */
    .card { background: #fff; border: 2px solid #e8ebf0; border-radius: 16px; overflow: hidden; transition: border-color .15s, box-shadow .15s; }
    .card:hover { border-color: #1cb0a8; box-shadow: 0 4px 20px rgba(28,176,168,.12); }
    .card .img-wrap { position: relative; width: 100%; aspect-ratio: 4/3; background: #eef1f6; overflow: hidden; }
    .card .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .card .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; color: #9aa1ad; gap: 4px; }
    .card .placeholder .letter { font-size: 48px; font-weight: 900; opacity: .4; }
    .card .placeholder .ph-text { font-size: 12px; font-weight: 700; }
    .card .info { padding: 12px 14px; }
    .card .top-row { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
    .card .word { font-size: 17px; font-weight: 900; text-transform: capitalize; }
    .card .level-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 800; background: #e0f2fe; color: #0369a1; white-space: nowrap; }
    .card .vi { color: #6b7280; font-size: 13px; margin-top: 2px; }
    .card .actions { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .btn { padding: 8px 14px; border: 0; border-radius: 10px; font-size: 13px; font-weight: 800; cursor: pointer; transition: all .15s; }
    .btn-primary { background: #1cb0a8; color: #fff; }
    .btn-primary:hover { background: #17998f; }
    .btn-warn { background: #fef3c7; color: #92400e; }
    .btn-warn:hover { background: #fde68a; }
    .saved-msg { color: #059669; font-size: 12px; font-weight: 800; }

    /* ── Pagination ── */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 20px; }
    .pagination .pg-info { font-size: 14px; font-weight: 800; color: #374151; }
    .pagination .btn-pg { padding: 8px 16px; border-radius: 10px; border: 2px solid #e2e5ec; background: #fff; font-size: 13px; font-weight: 800; cursor: pointer; }
    .pagination .btn-pg:hover:not(:disabled) { border-color: #1cb0a8; color: #1cb0a8; }
    .pagination .btn-pg:disabled { opacity: .3; cursor: default; }

    /* ── Modal ── */
    .overlay { position: fixed; inset: 0; background: rgba(15,30,40,.6); backdrop-filter: blur(4px); display: none; align-items: flex-start; justify-content: center; z-index: 50; padding: 24px; overflow: auto; }
    .overlay.open { display: flex; }
    .panel { background: #fff; border-radius: 20px; width: 100%; max-width: 860px; padding: 20px 24px; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
    .panel .ptop { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .panel .ptitle { font-size: 20px; font-weight: 900; }
    .panel .psub { color: #6b7280; font-size: 13px; }
    .panel .btn-close { padding: 8px 14px; border-radius: 10px; border: 2px solid #e2e5ec; background: #fff; font-size: 13px; font-weight: 800; cursor: pointer; }
    .panel .btn-close:hover { border-color: #ef4444; color: #ef4444; }
    .mgrid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; min-height: 120px; }
    .mgrid .img-cell { position: relative; border-radius: 12px; overflow: hidden; cursor: pointer; aspect-ratio: 4/3; border: 3px solid transparent; transition: all .15s; }
    .mgrid .img-cell:hover { border-color: #1cb0a8; transform: scale(1.03); }
    .mgrid .img-cell:hover .check { opacity: 1; }
    .mgrid .img-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .mgrid .check { position: absolute; top: 6px; right: 6px; width: 28px; height: 28px; border-radius: 50%; background: #1cb0a8; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; opacity: 0; transition: opacity .15s; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
    .mgrid .loading, .mgrid .empty { grid-column: 1/-1; text-align: center; color: #6b7280; padding: 40px 0; font-weight: 700; }
    .mnav { display: flex; align-items: center; gap: 10px; justify-content: center; margin-top: 14px; }
    .mnav .pg { font-weight: 800; font-size: 13px; }
    .urlrow { display: flex; gap: 8px; margin-top: 14px; }
    .urlrow input { flex: 1; padding: 10px 14px; border: 2px solid #e2e5ec; border-radius: 10px; font-size: 14px; font-weight: 600; outline: none; }
    .urlrow input:focus { border-color: #1cb0a8; }
    @media (max-width: 600px) { .mgrid { grid-template-columns: repeat(2, 1fr); } }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>🖼️ Chọn ảnh minh hoạ</h1>
    <p class="desc">Bấm "Đổi ảnh" → duyệt ảnh Pexels → hover ✓ để chọn. Lưu xong đồng bộ cho mọi người.</p>
    <div class="authbar" id="authBar"></div>
    <div class="stats" id="stats"></div>
    <div class="filters">
      <input class="search-box" id="searchBox" placeholder="🔎 Tìm từ..." />
      <select id="topicFilter"><option value="">Tất cả chủ đề</option></select>
      <button class="btn-filter" id="missingBtn">📷 Chỉ thiếu ảnh</button>
      <div class="chip-row" id="levelChips"></div>
      <span class="colsel" id="colSel" title="Số cột"></span>
    </div>
  </div>

  <!-- Grid -->
  <div class="grid" id="grid"></div>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>

  <!-- Modal -->
  <div class="overlay" id="overlay">
    <div class="panel">
      <div class="ptop">
        <div>
          <div class="ptitle" id="mTitle"></div>
          <div class="psub" id="mSub"></div>
        </div>
        <button class="btn-close" id="mClose">✕ Đóng</button>
      </div>
      <div class="urlrow" style="border:0;padding-bottom:0">
        <input id="mQuery" placeholder="🔎 Đổi từ khoá để tìm ảnh khác (vd: ripe banana)..." />
        <button class="btn btn-primary" id="mSearchBtn">Tìm</button>
        <span class="colsel" id="mColSel" title="Số cột"></span>
      </div>
      <div class="mgrid" id="mGrid"></div>
      <div class="mnav">
        <button class="btn-pg" id="mPrev">◀ Trước</button>
        <span class="pg" id="mPage">Trang 1</span>
        <button class="btn-pg" id="mNext">Sau ▶</button>
      </div>
      <div class="urlrow">
        <input id="mUrl" placeholder="Hoặc dán URL ảnh tuỳ ý..." />
        <button class="btn btn-primary" id="mUrlBtn">Dùng URL</button>
      </div>
    </div>
  </div>

  <script>
    const API = location.origin;
    const PAGE_SIZE = 24;
    const LEVELS = [
      { value: "", label: "Tất cả" },
      { value: "kids", label: "Trẻ em" },
      { value: "a1", label: "A1" },
      { value: "a2", label: "A2" },
      { value: "b1", label: "B1" },
      { value: "b2", label: "B2" },
      { value: "c1", label: "C1" },
    ];

    let ALL_WORDS = [];
    let filtered = [];
    let currentPage = 1;
    let filterLevel = "";
    let filterMissing = false;
    let filterSearch = "";
    let filterTopic = "";

    // Modal state
    let cur = null;
    let mPage = 1;
    let curCardEl = null;

    // ── Đăng nhập + phân quyền (giống trang chỉnh ảnh trong app) ──
    let ME = null;
    function token() { return localStorage.getItem("eb_token") || ""; }
    function canEdit() { return !!ME && (ME.role === "admin" || ME.canEditImages); }

    async function checkAuth() {
      ME = null;
      const t = token();
      if (t) {
        try { const r = await fetch(API + "/api/me", { headers: { Authorization: "Bearer " + t } }); if (r.ok) ME = await r.json(); } catch (e) {}
      }
      renderAuthBar();
    }
    function renderAuthBar() {
      const bar = document.getElementById("authBar");
      if (canEdit()) {
        bar.innerHTML = '<span class="ok">✓ ' + ME.name + ' — được phép sửa ảnh</span> <button class="ghost" id="logoutBtn">Đăng xuất</button>';
        document.getElementById("logoutBtn").onclick = () => { localStorage.removeItem("eb_token"); localStorage.removeItem("eb_user"); checkAuth(); };
      } else if (ME) {
        bar.innerHTML = '<span class="warn">⚠ ' + ME.name + ': chưa được cấp quyền sửa ảnh. Liên hệ admin.</span> <button class="ghost" id="logoutBtn">Đăng xuất</button>';
        document.getElementById("logoutBtn").onclick = () => { localStorage.removeItem("eb_token"); localStorage.removeItem("eb_user"); checkAuth(); };
      } else {
        bar.innerHTML =
          '<span class="warn">Đăng nhập để sửa ảnh:</span>' +
          '<input id="liEmail" type="email" placeholder="email" autocomplete="username" />' +
          '<input id="liPass" type="password" placeholder="mật khẩu" autocomplete="current-password" />' +
          '<button id="loginBtn">Đăng nhập</button>';
        document.getElementById("loginBtn").onclick = doLogin;
        document.getElementById("liPass").onkeydown = (e) => { if (e.key === "Enter") doLogin(); };
      }
    }
    async function doLogin() {
      const email = document.getElementById("liEmail").value.trim();
      const password = document.getElementById("liPass").value;
      try {
        const r = await fetch(API + "/api/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, password }) });
        if (!r.ok) { alert("Sai email hoặc mật khẩu."); return; }
        const d = await r.json();
        localStorage.setItem("eb_token", d.token);
        if (d.user) localStorage.setItem("eb_user", JSON.stringify(d.user));
        await checkAuth();
      } catch (e) { alert("Lỗi đăng nhập."); }
    }

    // ── Init ──
    async function init() {
      await checkAuth();
      ALL_WORDS = await (await fetch(API + "/api/vocabulary")).json();
      const topics = await (await fetch(API + "/api/topics")).json();

      const sel = document.getElementById("topicFilter");
      topics.forEach(t => {
        const o = document.createElement("option");
        o.value = t.id;
        o.textContent = t.name + " — " + t.name_vi;
        sel.appendChild(o);
      });

      // Level chips
      const chipRow = document.getElementById("levelChips");
      LEVELS.forEach(lv => {
        const c = document.createElement("button");
        c.className = "chip" + (lv.value === "" ? " active" : "");
        c.textContent = lv.label;
        c.dataset.level = lv.value;
        c.onclick = () => {
          filterLevel = lv.value;
          chipRow.querySelectorAll(".chip").forEach(ch => ch.classList.toggle("active", ch.dataset.level === lv.value));
          currentPage = 1;
          applyFilter();
        };
        chipRow.appendChild(c);
      });

      // Events
      sel.onchange = () => { filterTopic = sel.value; currentPage = 1; applyFilter(); };
      document.getElementById("searchBox").oninput = (e) => { filterSearch = e.target.value.toLowerCase().trim(); currentPage = 1; applyFilter(); };
      document.getElementById("missingBtn").onclick = () => {
        filterMissing = !filterMissing;
        document.getElementById("missingBtn").classList.toggle("active", filterMissing);
        currentPage = 1;
        applyFilter();
      };

      // Bộ chọn số cột (2..6) cho lưới từ và lưới ảnh trong modal
      setupColSel("colSel", 6, (n) => { document.getElementById("grid").style.gridTemplateColumns = "repeat(" + n + ", 1fr)"; });
      setupColSel("mColSel", 6, (n) => { document.getElementById("mGrid").style.gridTemplateColumns = "repeat(" + n + ", 1fr)"; });

      // Tìm ảnh theo từ khoá khác
      document.getElementById("mSearchBtn").onclick = () => loadModalPage(1);
      document.getElementById("mQuery").addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); loadModalPage(1); } });

      applyFilter();
    }

    // Tạo nút chọn số cột 2..6 (không áp inline lúc đầu để giữ responsive; click mới áp).
    function setupColSel(elId, def, apply) {
      const host = document.getElementById(elId);
      host.innerHTML = "";
      [2, 3, 4, 5, 6].forEach(n => {
        const b = document.createElement("button");
        b.textContent = n;
        b.className = n === def ? "active" : "";
        b.onclick = () => { host.querySelectorAll("button").forEach(x => x.classList.toggle("active", x === b)); apply(n); };
        host.appendChild(b);
      });
    }

    // ── Filter + render ──
    function applyFilter() {
      filtered = ALL_WORDS.filter(w => {
        if (filterTopic && !w.topicIds.includes(filterTopic)) return false;
        if (filterLevel && w.level !== filterLevel) return false;
        if (filterMissing && w.imageUrl) return false;
        if (filterSearch && !w.word.toLowerCase().includes(filterSearch) && !w.meaning_vi.toLowerCase().includes(filterSearch)) return false;
        return true;
      });
      renderStats();
      renderGrid();
      renderPagination();
    }

    function renderStats() {
      const total = filtered.length;
      const hasImg = filtered.filter(w => w.imageUrl).length;
      const missing = total - hasImg;
      document.getElementById("stats").innerHTML =
        '<span>Hiển thị ' + total + ' từ</span>' +
        '<span class="pill green">✓ Có ảnh ' + hasImg + '/' + total + '</span>' +
        (missing > 0 ? '<span class="pill red">✗ Thiếu ' + missing + '</span>' : '');
    }

    function renderGrid() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      const start = (currentPage - 1) * PAGE_SIZE;
      const pageWords = filtered.slice(start, start + PAGE_SIZE);
      if (pageWords.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:#9aa1ad;font-weight:700">Không có từ nào phù hợp</div>';
        return;
      }
      pageWords.forEach(w => grid.appendChild(createCard(w)));
    }

    function createCard(w) {
      const el = document.createElement("div");
      el.className = "card";
      el.dataset.id = w.id;

      const hasImg = !!w.imageUrl;
      const imgHtml = hasImg
        ? '<img src="' + w.imageUrl + '" alt="' + w.word + '" loading="lazy">'
        : '<div class="placeholder"><span class="letter">' + w.word[0].toUpperCase() + '</span><span class="ph-text">Chưa có ảnh</span></div>';

      const levelColor = { kids: "#f3e8ff;color:#7c3aed", a1: "#e0f2fe;color:#0369a1", a2: "#d1fae5;color:#047857", b1: "#fef3c7;color:#92400e", b2: "#fee2e2;color:#b91c1c", c1: "#f3e8ff;color:#6b21a8" };
      const badgeStyle = levelColor[w.level] || "#f3f4f6;color:#374151";

      el.innerHTML =
        '<div class="img-wrap">' + imgHtml + '</div>' +
        '<div class="info">' +
          '<div class="top-row">' +
            '<span class="word">' + w.word + '</span>' +
            '<span class="level-badge" style="background:' + badgeStyle + '">' + (w.level || "?").toUpperCase() + '</span>' +
          '</div>' +
          '<div class="vi">' + w.meaning_vi + '</div>' +
          '<div class="actions">' +
            '<button class="btn ' + (hasImg ? "btn-primary" : "btn-warn") + '">' + (hasImg ? "Đổi ảnh" : "➕ Thêm ảnh") + '</button>' +
            '<span class="saved-msg"></span>' +
          '</div>' +
        '</div>';

      el.querySelector(".btn").onclick = () => openModal(w, el);
      return el;
    }

    function renderPagination() {
      const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
      const pg = document.getElementById("pagination");
      if (totalPages <= 1) { pg.innerHTML = ""; return; }
      pg.innerHTML =
        '<button class="btn-pg" id="pgPrev" ' + (currentPage <= 1 ? "disabled" : "") + '>◀ Trước</button>' +
        '<span class="pg-info">Trang ' + currentPage + ' / ' + totalPages + '</span>' +
        '<button class="btn-pg" id="pgNext" ' + (currentPage >= totalPages ? "disabled" : "") + '>Sau ▶</button>';
      document.getElementById("pgPrev").onclick = () => { if (currentPage > 1) { currentPage--; renderGrid(); renderPagination(); window.scrollTo(0, 0); } };
      document.getElementById("pgNext").onclick = () => { if (currentPage < totalPages) { currentPage++; renderGrid(); renderPagination(); window.scrollTo(0, 0); } };
    }

    // ── Modal ──
    function openModal(w, el) {
      cur = w; curCardEl = el; mPage = 1;
      document.getElementById("mTitle").textContent = w.word + " — " + w.meaning_vi;
      document.getElementById("mSub").textContent = "Chọn ảnh phù hợp từ Pexels hoặc dán URL";
      document.getElementById("mUrl").value = "";
      document.getElementById("mQuery").value = w.word;
      document.getElementById("overlay").classList.add("open");
      document.body.style.overflow = "hidden";
      loadModalPage(1);
    }

    function closeModal() {
      document.getElementById("overlay").classList.remove("open");
      document.body.style.overflow = "";
    }

    async function loadModalPage(p) {
      const grid = document.getElementById("mGrid");
      grid.innerHTML = '<div class="loading">Đang tải ảnh…</div>';
      try {
        const query = (document.getElementById("mQuery").value || "").trim() || cur.word;
        const list = await (await fetch(API + "/api/image?count=30&page=" + p + "&query=" + encodeURIComponent(query))).json();
        mPage = p;
        grid.innerHTML = "";
        if (!list || list.length === 0) {
          grid.innerHTML = '<div class="empty">Không tìm thấy ảnh cho "' + query + '"</div>';
        } else {
          list.forEach(im => {
            const cell = document.createElement("div");
            cell.className = "img-cell";
            cell.innerHTML = '<img src="' + im.thumbUrl + '" alt="' + (im.photographer || "") + '" loading="lazy"><div class="check">✓</div>';
            cell.onclick = () => pick(im.url);
            grid.appendChild(cell);
          });
        }
        document.getElementById("mPage").textContent = "Trang " + p;
        document.getElementById("mPrev").disabled = p <= 1;
        document.getElementById("mNext").disabled = !list || list.length < 30;
      } catch (e) {
        grid.innerHTML = '<div class="empty">Lỗi tải ảnh. Thử lại sau.</div>';
      }
    }

    async function pick(url) {
      if (!canEdit()) { alert("Hãy đăng nhập tài khoản được cấp quyền sửa ảnh (thanh trên cùng)."); return; }
      const res = await fetch(API + "/api/image-pick", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + token() },
        body: JSON.stringify({ wordId: cur.id, url })
      });
      if (!res.ok) {
        if (res.status === 401 || res.status === 403) { alert("Phiên hết hạn hoặc chưa đủ quyền. Đăng nhập lại."); await checkAuth(); return; }
        alert("Lưu ảnh lỗi (" + res.status + ").");
        return;
      }
      cur.imageUrl = url;
      // Update card in-place
      const wrap = curCardEl.querySelector(".img-wrap");
      wrap.innerHTML = '<img src="' + url + '" alt="' + cur.word + '">';
      const btn = curCardEl.querySelector(".btn");
      btn.className = "btn btn-primary";
      btn.textContent = "Đổi ảnh";
      curCardEl.querySelector(".saved-msg").textContent = "✓ Đã lưu";
      // Update stats
      renderStats();
      closeModal();
    }

    // Modal events
    document.getElementById("mPrev").onclick = () => mPage > 1 && loadModalPage(mPage - 1);
    document.getElementById("mNext").onclick = () => loadModalPage(mPage + 1);
    document.getElementById("mClose").onclick = closeModal;
    document.getElementById("mUrlBtn").onclick = () => { const u = document.getElementById("mUrl").value.trim(); if (u) pick(u); };
    document.getElementById("overlay").onclick = (e) => { if (e.target.id === "overlay") closeModal(); };
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

    init();
  </script>
</body>
</html>
